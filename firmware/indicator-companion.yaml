substitutions:
  name: indicator-companion
  friendly_name: Indicator AI Companion

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.12.0

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none   # 关闭 modem sleep —— 消除高延迟/丢包(连接不稳的根因)
  output_power: 20dB      # 最大发射功率
  ap: {}

captive_portal:

ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_key
  actions:
    - action: show_card
      variables:
        status: string
        mood: string
        title: string
        body: string
        footer: string
      then:
        - lvgl.label.update:
            id: lbl_mood
            text: !lambda 'return mood.c_str();'
        - lvgl.label.update:
            id: lbl_title
            text: !lambda 'return title.c_str();'
        - lvgl.label.update:
            id: lbl_body
            text: !lambda 'return body.c_str();'
        - lvgl.label.update:
            id: lbl_footer
            text: !lambda 'return footer.c_str();'
        - lvgl.label.update:
            id: lbl_mood
            text_color: !lambda |-
              if (status == "run") return lv_color_hex(0x4FC3F7);
              else if (status == "think") return lv_color_hex(0x5C9DFF);
              else if (status == "wait") return lv_color_hex(0xFFB74D);
              else if (status == "done" || status == "ready" || status == "online") return lv_color_hex(0x66BB6A);
              else return lv_color_hex(0x90A4AE);
        - lvgl.widget.update:
            id: wait_frame
            border_opa: !lambda 'return status == "wait" ? 255 : 0;'
        - light.turn_on: backlight
        - lvgl.resume:
        - lvgl.widget.redraw:
    # 会话指标(context 用量 + 5h limit),由 statusLine 经 bridge 推送
    - action: set_metrics
      variables:
        metrics: string
      then:
        - lvgl.label.update:
            id: lbl_metrics
            text: !lambda 'return metrics.c_str();'
    # 多 session 图标条:count 个活跃会话,focus 为当前选中(详情卡所示)的槽位。
    # 星芒固定 Claude 品牌色 0xD97757;run/think(working)时呼吸+满亮,其余静止+变暗。
    # 状态色体现在图标下方的项目名文字上(青=run/蓝=think/橙=wait/绿=done/灰=idle)。
    # count==0 显示待机眼睛。
    - action: set_sessions
      variables:
        count: int
        focus: int
        s0_status: string
        s0_label: string
        s1_status: string
        s1_label: string
        s2_status: string
        s2_label: string
        s3_status: string
        s3_label: string
      then:
        - if:
            condition:
              lambda: 'return count > 0;'
            then:
              - lvgl.widget.hide: status_eyes
            else:
              - lvgl.widget.show: status_eyes
        # ---- slot 0 ----
        - if:
            condition:
              lambda: 'return count > 0;'
            then:
              - lvgl.widget.show: slot0
              - lvgl.label.update:
                  id: slot0_lbl
                  text: !lambda 'return s0_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s0_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot0_icon
                  image_recolor_opa: !lambda 'return (s0_status == "run" || s0_status == "think" || s0_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s0_status == "run" || s0_status == "think";'
                  then:
                    - lvgl.animimg.start: slot0_icon
                  else:
                    - lvgl.animimg.stop: slot0_icon
            else:
              - lvgl.animimg.stop: slot0_icon
              - lvgl.widget.hide: slot0
        - if:
            condition:
              lambda: 'return count > 0 && focus == 0;'
            then:
              - lvgl.widget.show: hl0
            else:
              - lvgl.widget.hide: hl0
        # ---- slot 1 ----
        - if:
            condition:
              lambda: 'return count > 1;'
            then:
              - lvgl.widget.show: slot1
              - lvgl.label.update:
                  id: slot1_lbl
                  text: !lambda 'return s1_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s1_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot1_icon
                  image_recolor_opa: !lambda 'return (s1_status == "run" || s1_status == "think" || s1_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s1_status == "run" || s1_status == "think";'
                  then:
                    - lvgl.animimg.start: slot1_icon
                  else:
                    - lvgl.animimg.stop: slot1_icon
            else:
              - lvgl.animimg.stop: slot1_icon
              - lvgl.widget.hide: slot1
        - if:
            condition:
              lambda: 'return count > 1 && focus == 1;'
            then:
              - lvgl.widget.show: hl1
            else:
              - lvgl.widget.hide: hl1
        # ---- slot 2 ----
        - if:
            condition:
              lambda: 'return count > 2;'
            then:
              - lvgl.widget.show: slot2
              - lvgl.label.update:
                  id: slot2_lbl
                  text: !lambda 'return s2_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s2_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot2_icon
                  image_recolor_opa: !lambda 'return (s2_status == "run" || s2_status == "think" || s2_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s2_status == "run" || s2_status == "think";'
                  then:
                    - lvgl.animimg.start: slot2_icon
                  else:
                    - lvgl.animimg.stop: slot2_icon
            else:
              - lvgl.animimg.stop: slot2_icon
              - lvgl.widget.hide: slot2
        - if:
            condition:
              lambda: 'return count > 2 && focus == 2;'
            then:
              - lvgl.widget.show: hl2
            else:
              - lvgl.widget.hide: hl2
        # ---- slot 3 ----
        - if:
            condition:
              lambda: 'return count > 3;'
            then:
              - lvgl.widget.show: slot3
              - lvgl.label.update:
                  id: slot3_lbl
                  text: !lambda 'return s3_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s3_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot3_icon
                  image_recolor_opa: !lambda 'return (s3_status == "run" || s3_status == "think" || s3_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s3_status == "run" || s3_status == "think";'
                  then:
                    - lvgl.animimg.start: slot3_icon
                  else:
                    - lvgl.animimg.stop: slot3_icon
            else:
              - lvgl.animimg.stop: slot3_icon
              - lvgl.widget.hide: slot3
        - if:
            condition:
              lambda: 'return count > 3 && focus == 3;'
            then:
              - lvgl.widget.show: hl3
            else:
              - lvgl.widget.hide: hl3
        - light.turn_on: backlight
        - lvgl.resume:
        - lvgl.widget.redraw:
    # 屏保:active 显隐全屏大眼睛,line/hint 由 bridge 推送
    - action: set_screensaver
      variables:
        active: bool
        line: string
        hint: string
      then:
        - lvgl.label.update:
            id: saver_line
            text: !lambda 'return line.c_str();'
        - lvgl.label.update:
            id: saver_hint
            text: !lambda 'return hint.c_str();'
        - if:
            condition:
              lambda: 'return active;'
            then:
              - lvgl.animimg.start: saver_eyes
              - lvgl.widget.show: saver
              - light.turn_on: backlight
              - lvgl.resume:
              - lvgl.widget.redraw:
            else:
              - lvgl.widget.hide: saver
              - lvgl.animimg.stop: saver_eyes
              - lvgl.resume:
              - lvgl.widget.redraw:

i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48
    miso_pin: GPIO47

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16

output:
  - platform: ledc
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: ledc_backlight
    frequency: 100Hz

light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: ledc_backlight
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_rgb
    model: SEEED-INDICATOR-D1
    id: sensecap_display

touchscreen:
  platform: ft5x06
  id: sensecap_touchscreen
  transform:
    mirror_x: true
    mirror_y: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
    name: Refresh Button
    id: refresh_button
    on_press:
      then:
        - lvgl.label.update:
            id: lbl_footer
            text: "…"

# 触摸点选 session 用:每次点击递增,publish 值 = tap_seq*4 + 槽位索引。
# 自增保证值每次都变(同槽连点也会上报),bridge 取 int(value)%4 还原槽位。
globals:
  - id: tap_seq
    type: int
    restore_value: no
    initial_value: '0'
  # 屏保点屏唤醒:自增以强制上报,bridge 据此退出屏保
  - id: wake_seq
    type: int
    restore_value: no
    initial_value: '0'

sensor:
  - platform: template
    name: "Selected Session"
    id: selected_session
    accuracy_decimals: 0
    update_interval: never
  - platform: template
    name: "Screensaver Wake"
    id: screensaver_wake
    accuracy_decimals: 0
    update_interval: never

image: !include images.yaml

font:
  - file: "fonts/ChineseFont.ttf"
    id: font_lg
    size: 30
    bpp: 2
    glyphsets: []
    glyphs: !include glyphs_zh.yaml
  - file: "fonts/ChineseFont.ttf"
    id: font_sm
    size: 19
    bpp: 2
    glyphsets: []
    glyphs: !include glyphs_zh.yaml

lvgl:
  displays:
    - sensecap_display
  touchscreens: sensecap_touchscreen
  buffer_size: 50%
  default_font: font_sm
  log_level: WARN
  color_depth: 16
  bg_color: 0x05070D
  widgets:
    # 全屏背景:垂直渐变填充(上方辉光色 → 下方近黑),替代原 480x480 bg.png(省 ~450KB flash)
    - obj:
        align: CENTER
        width: 100%
        height: 100%
        radius: 0
        pad_all: 0
        border_width: 0
        clickable: false
        bg_color: 0x102A3A
        bg_grad_color: 0x05070D
        bg_grad_dir: VER
    # 待机头像:无活跃 session 时显示的眨眼睛(count>0 时被 set_sessions 隐藏)
    - animimg:
        id: status_eyes
        align: TOP_LEFT
        x: 28
        y: 26
        src: [eye_00, eye_01, eye_02, eye_03, eye_04, eye_05, eye_06, eye_07, eye_08, eye_09, eye_10, eye_11, eye_12, eye_13, eye_14, eye_15, eye_16]
        duration: 3000ms
        repeat_count: forever
        auto_start: true
        image_recolor: 0xFFB74D
        image_recolor_opa: 0
    # 顶部 session 图标条:4 个可点槽位(Claude 星芒 + 项目名),默认隐藏,由 set_sessions 驱动。
    # 点击 -> 自增 tap_seq、publish selected_session(*4+索引),bridge 据此切换详情卡焦点。
    - button:
        id: slot0
        align: TOP_LEFT
        x: 4
        y: 10
        width: 112
        height: 92
        bg_opa: 0
        border_width: 0
        shadow_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(tap_seq) += 1; id(selected_session).publish_state(id(tap_seq) * 4 + 0);'
        widgets:
          - animimg:
              id: slot0_icon
              align: TOP_MID
              y: 4
              src: [claude_00, claude_01, claude_02, claude_03, claude_04, claude_05, claude_06, claude_07, claude_08, claude_09, claude_10, claude_11]
              duration: 850ms
              repeat_count: forever
              auto_start: false
              image_recolor: 0xD97757
              image_recolor_opa: 100%
          - label:
              id: slot0_lbl
              align: BOTTOM_MID
              y: -2
              width: 110
              text_align: CENTER
              long_mode: CLIP
              text_font: font_sm
              text_color: 0xC2CEDC
              text: ""
    - button:
        id: slot1
        align: TOP_LEFT
        x: 124
        y: 10
        width: 112
        height: 92
        bg_opa: 0
        border_width: 0
        shadow_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(tap_seq) += 1; id(selected_session).publish_state(id(tap_seq) * 4 + 1);'
        widgets:
          - animimg:
              id: slot1_icon
              align: TOP_MID
              y: 4
              src: [claude_00, claude_01, claude_02, claude_03, claude_04, claude_05, claude_06, claude_07, claude_08, claude_09, claude_10, claude_11]
              duration: 850ms
              repeat_count: forever
              auto_start: false
              image_recolor: 0xD97757
              image_recolor_opa: 100%
          - label:
              id: slot1_lbl
              align: BOTTOM_MID
              y: -2
              width: 110
              text_align: CENTER
              long_mode: CLIP
              text_font: font_sm
              text_color: 0xC2CEDC
              text: ""
    - button:
        id: slot2
        align: TOP_LEFT
        x: 244
        y: 10
        width: 112
        height: 92
        bg_opa: 0
        border_width: 0
        shadow_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(tap_seq) += 1; id(selected_session).publish_state(id(tap_seq) * 4 + 2);'
        widgets:
          - animimg:
              id: slot2_icon
              align: TOP_MID
              y: 4
              src: [claude_00, claude_01, claude_02, claude_03, claude_04, claude_05, claude_06, claude_07, claude_08, claude_09, claude_10, claude_11]
              duration: 850ms
              repeat_count: forever
              auto_start: false
              image_recolor: 0xD97757
              image_recolor_opa: 100%
          - label:
              id: slot2_lbl
              align: BOTTOM_MID
              y: -2
              width: 110
              text_align: CENTER
              long_mode: CLIP
              text_font: font_sm
              text_color: 0xC2CEDC
              text: ""
    - button:
        id: slot3
        align: TOP_LEFT
        x: 364
        y: 10
        width: 112
        height: 92
        bg_opa: 0
        border_width: 0
        shadow_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(tap_seq) += 1; id(selected_session).publish_state(id(tap_seq) * 4 + 3);'
        widgets:
          - animimg:
              id: slot3_icon
              align: TOP_MID
              y: 4
              src: [claude_00, claude_01, claude_02, claude_03, claude_04, claude_05, claude_06, claude_07, claude_08, claude_09, claude_10, claude_11]
              duration: 850ms
              repeat_count: forever
              auto_start: false
              image_recolor: 0xD97757
              image_recolor_opa: 100%
          - label:
              id: slot3_lbl
              align: BOTTOM_MID
              y: -2
              width: 110
              text_align: CENTER
              long_mode: CLIP
              text_font: font_sm
              text_color: 0xC2CEDC
              text: ""
    # 焦点指示条:置于被选中槽位下方,set_sessions 据 focus 显示其一
    - obj:
        id: hl0
        align: TOP_LEFT
        x: 28
        y: 104
        width: 64
        height: 4
        radius: 2
        bg_color: 0xF2F5F8
        bg_opa: 90%
        border_width: 0
        pad_all: 0
        clickable: false
        hidden: true
    - obj:
        id: hl1
        align: TOP_LEFT
        x: 148
        y: 104
        width: 64
        height: 4
        radius: 2
        bg_color: 0xF2F5F8
        bg_opa: 90%
        border_width: 0
        pad_all: 0
        clickable: false
        hidden: true
    - obj:
        id: hl2
        align: TOP_LEFT
        x: 268
        y: 104
        width: 64
        height: 4
        radius: 2
        bg_color: 0xF2F5F8
        bg_opa: 90%
        border_width: 0
        pad_all: 0
        clickable: false
        hidden: true
    - obj:
        id: hl3
        align: TOP_LEFT
        x: 388
        y: 104
        width: 64
        height: 4
        radius: 2
        bg_color: 0xF2F5F8
        bg_opa: 90%
        border_width: 0
        pad_all: 0
        clickable: false
        hidden: true
    # 详情卡(下移让出顶部图标条):焦点 session 的 mood/title/body/footer
    - label:
        id: lbl_mood
        align: TOP_LEFT
        x: 30
        y: 122
        text_font: font_sm
        text_color: 0x4FC3F7
        text: "booting"
    - label:
        id: lbl_title
        align: TOP_LEFT
        x: 30
        y: 150
        text_font: font_lg
        text_color: 0xF2F5F8
        text: "Indicator AI"
    - label:
        id: lbl_body
        align: TOP_LEFT
        x: 30
        y: 198
        width: 420
        long_mode: WRAP
        text_font: font_sm
        text_color: 0xC2CEDC
        text: "Waiting for bridge…"
    - label:
        id: lbl_footer
        align: BOTTOM_LEFT
        x: 30
        y: -24
        text_font: font_sm
        text_color: 0x8FA0B4
        text: "offline"
    - label:
        id: lbl_metrics
        align: BOTTOM_RIGHT
        x: -30
        y: -24
        text_font: font_sm
        text_color: 0x5E7088
        text: ""
    # status==wait 时整屏橙色边框(默认透明),驱动逻辑在 show_card。
    # clickable: false —— 全屏覆盖但不拦截触摸,放行点到下面的 session 槽位。
    - obj:
        id: wait_frame
        align: CENTER
        width: 100%
        height: 100%
        bg_opa: 0
        radius: 0
        pad_all: 0
        clickable: false
        border_color: 0xFFB74D
        border_width: 10
        border_opa: 0
    # 屏保覆盖层(置顶默认隐藏):大眼睛复用待机眼帧 transform_scale 放大(零 flash);
    # 点任意处本地隐藏并 publish screensaver_wake 回传 bridge
    - button:
        id: saver
        align: CENTER
        width: 100%
        height: 100%
        bg_color: 0x05070D
        bg_opa: 100%
        radius: 0
        border_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(wake_seq) += 1; id(screensaver_wake).publish_state(id(wake_seq));'
          - lvgl.widget.hide: saver
          - lvgl.animimg.stop: saver_eyes
          - lvgl.resume:
          - lvgl.widget.redraw:
        widgets:
          - animimg:
              id: saver_eyes
              align: TOP_LEFT
              x: 61
              y: 96
              src: [eye_00, eye_01, eye_02, eye_03, eye_04, eye_05, eye_06, eye_07, eye_08, eye_09, eye_10, eye_11, eye_12, eye_13, eye_14, eye_15, eye_16]
              duration: 3400ms
              repeat_count: forever
              auto_start: false
              transform_pivot_x: 0
              transform_pivot_y: 0
              transform_scale: 2.8
          - label:
              id: saver_line
              align: TOP_MID
              y: 292
              width: 440
              text_align: CENTER
              long_mode: WRAP
              text_font: font_sm
              text_color: 0xC2CEDC
              text: ""
          - label:
              id: saver_hint
              align: BOTTOM_MID
              y: -30
              text_font: font_sm
              text_color: 0x5E7088
              text: ""
