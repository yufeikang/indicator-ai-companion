substitutions:
  name: indicator-companion
  friendly_name: Indicator AI Companion

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  min_version: 2024.12.0

esp32:
  variant: esp32s3
  flash_size: 8MB
  framework:
    type: esp-idf
    # loopTask 默认栈 8KB，装不下嵌套 LVGL 眼睛(obj 多层 + 渐变)样式刷新的深递归，
    # 叠加 API 首连时 ComponentIterator 遍历实体 → 栈溢出复位(会连带冲坏 API 迭代器内存
    # 触发 LoadProhibited)。提到 32KB(该选项上限)留足余量。静态栈仅多占 ~24KB SRAM。
    advanced:
      loop_task_stack_size: 32768
    sdkconfig_options:
      CONFIG_ESPTOOLPY_FLASHSIZE_8MB: y
      CONFIG_ESP32S3_DEFAULT_CPU_FREQ_240: y
      CONFIG_ESP32S3_DATA_CACHE_64KB: y
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: y
      CONFIG_SPIRAM_RODATA: y

psram:
  mode: octal
  speed: 80MHz

logger:
  hardware_uart: UART0
  level: INFO

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  power_save_mode: none   # 关闭 modem sleep —— 消除高延迟/丢包(连接不稳的根因)
  output_power: 20dB      # 最大发射功率
  ap: {}

captive_portal:

ota:
  - platform: esphome

api:
  encryption:
    key: !secret api_key
  actions:
    - action: show_card
      variables:
        status: string
        mood: string
        title: string
        body: string
        footer: string
      then:
        - lvgl.label.update:
            id: lbl_mood
            text: !lambda 'return mood.c_str();'
        - lvgl.label.update:
            id: lbl_title
            text: !lambda 'return title.c_str();'
        - lvgl.label.update:
            id: lbl_body
            text: !lambda 'return body.c_str();'
        - lvgl.label.update:
            id: lbl_footer
            text: !lambda 'return footer.c_str();'
        - lvgl.label.update:
            id: lbl_mood
            text_color: !lambda |-
              if (status == "run") return lv_color_hex(0x4FC3F7);
              else if (status == "think") return lv_color_hex(0x5C9DFF);
              else if (status == "wait") return lv_color_hex(0xFFB74D);
              else if (status == "done" || status == "ready" || status == "online") return lv_color_hex(0x66BB6A);
              else return lv_color_hex(0x90A4AE);
        - lvgl.widget.update:
            id: wait_frame
            border_opa: !lambda 'return status == "wait" ? 255 : 0;'
        - light.turn_on: backlight
        - lvgl.resume:
        - lvgl.widget.redraw:
    # 会话指标(context 用量 + 5h limit),由 statusLine 经 bridge 推送
    - action: set_metrics
      variables:
        metrics: string
      then:
        - lvgl.label.update:
            id: lbl_metrics
            text: !lambda 'return metrics.c_str();'
    # 多 session 图标条:count 个活跃会话,focus 为当前选中(详情卡所示)的槽位。
    # 星芒固定 Claude 品牌色 0xD97757;run/think(working)时呼吸+满亮,其余静止+变暗。
    # 状态色体现在图标下方的项目名文字上(青=run/蓝=think/橙=wait/绿=done/灰=idle)。
    # count==0 显示待机眼睛。
    - action: set_sessions
      variables:
        count: int
        focus: int
        s0_status: string
        s0_label: string
        s1_status: string
        s1_label: string
        s2_status: string
        s2_label: string
        s3_status: string
        s3_label: string
      then:
        - if:
            condition:
              lambda: 'return count > 0;'
            then:
              - lvgl.widget.hide: standby_eyes
              - globals.set:
                  id: standby_active
                  value: 'false'
            else:
              - lvgl.widget.show: standby_eyes
              - globals.set:
                  id: standby_active
                  value: 'true'
        # ---- slot 0 ----
        - if:
            condition:
              lambda: 'return count > 0;'
            then:
              - lvgl.widget.show: slot0
              - lvgl.label.update:
                  id: slot0_lbl
                  text: !lambda 'return s0_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s0_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot0_icon
                  image_recolor_opa: !lambda 'return (s0_status == "run" || s0_status == "think" || s0_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s0_status == "run" || s0_status == "think";'
                  then:
                    - lvgl.animimg.start: slot0_icon
                  else:
                    - lvgl.animimg.stop: slot0_icon
            else:
              - lvgl.animimg.stop: slot0_icon
              - lvgl.widget.hide: slot0
        - if:
            condition:
              lambda: 'return count > 0 && focus == 0;'
            then:
              - lvgl.widget.show: hl0
            else:
              - lvgl.widget.hide: hl0
        # ---- slot 1 ----
        - if:
            condition:
              lambda: 'return count > 1;'
            then:
              - lvgl.widget.show: slot1
              - lvgl.label.update:
                  id: slot1_lbl
                  text: !lambda 'return s1_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s1_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot1_icon
                  image_recolor_opa: !lambda 'return (s1_status == "run" || s1_status == "think" || s1_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s1_status == "run" || s1_status == "think";'
                  then:
                    - lvgl.animimg.start: slot1_icon
                  else:
                    - lvgl.animimg.stop: slot1_icon
            else:
              - lvgl.animimg.stop: slot1_icon
              - lvgl.widget.hide: slot1
        - if:
            condition:
              lambda: 'return count > 1 && focus == 1;'
            then:
              - lvgl.widget.show: hl1
            else:
              - lvgl.widget.hide: hl1
        # ---- slot 2 ----
        - if:
            condition:
              lambda: 'return count > 2;'
            then:
              - lvgl.widget.show: slot2
              - lvgl.label.update:
                  id: slot2_lbl
                  text: !lambda 'return s2_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s2_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot2_icon
                  image_recolor_opa: !lambda 'return (s2_status == "run" || s2_status == "think" || s2_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s2_status == "run" || s2_status == "think";'
                  then:
                    - lvgl.animimg.start: slot2_icon
                  else:
                    - lvgl.animimg.stop: slot2_icon
            else:
              - lvgl.animimg.stop: slot2_icon
              - lvgl.widget.hide: slot2
        - if:
            condition:
              lambda: 'return count > 2 && focus == 2;'
            then:
              - lvgl.widget.show: hl2
            else:
              - lvgl.widget.hide: hl2
        # ---- slot 3 ----
        - if:
            condition:
              lambda: 'return count > 3;'
            then:
              - lvgl.widget.show: slot3
              - lvgl.label.update:
                  id: slot3_lbl
                  text: !lambda 'return s3_label.c_str();'
                  text_color: !lambda |-
                    std::string s = s3_status;
                    if (s == "run") return lv_color_hex(0x4FC3F7);
                    if (s == "think") return lv_color_hex(0x5C9DFF);
                    if (s == "wait") return lv_color_hex(0xFFB74D);
                    if (s == "done" || s == "ready" || s == "online") return lv_color_hex(0x66BB6A);
                    return lv_color_hex(0x90A4AE);
              - lvgl.widget.update:
                  id: slot3_icon
                  image_recolor_opa: !lambda 'return (s3_status == "run" || s3_status == "think" || s3_status == "wait") ? 255 : 130;'
              - if:
                  condition:
                    lambda: 'return s3_status == "run" || s3_status == "think";'
                  then:
                    - lvgl.animimg.start: slot3_icon
                  else:
                    - lvgl.animimg.stop: slot3_icon
            else:
              - lvgl.animimg.stop: slot3_icon
              - lvgl.widget.hide: slot3
        - if:
            condition:
              lambda: 'return count > 3 && focus == 3;'
            then:
              - lvgl.widget.show: hl3
            else:
              - lvgl.widget.hide: hl3
        - light.turn_on: backlight
        - lvgl.resume:
        - lvgl.widget.redraw:
    # 屏保:active 显隐全屏大眼睛,line/hint 由 bridge 推送
    - action: set_screensaver
      variables:
        active: bool
        line: string
        hint: string
      then:
        - lvgl.label.update:
            id: saver_line
            text: !lambda 'return line.c_str();'
        - lvgl.label.update:
            id: saver_hint
            text: !lambda 'return hint.c_str();'
        - if:
            condition:
              lambda: 'return active;'
            then:
              # 仅首次进入才复位眼睛+显示;已在屏保中则上面的 label 更新即换新俏皮话
              - if:
                  condition:
                    lambda: 'return !id(saver_active);'
                  then:
                    - script.execute: enter_saver
            else:
              - script.execute: exit_saver

i2c:
  - id: bus_a
    sda: GPIO39
    scl: GPIO40
    scan: false

spi:
  - id: lcd_spi
    clk_pin: GPIO41
    mosi_pin: GPIO48
    miso_pin: GPIO47

pca9554:
  - id: pca9554a_device
    address: 0x20
    pin_count: 16

output:
  - platform: ledc
    pin:
      number: GPIO45
      ignore_strapping_warning: true
    id: ledc_backlight
    frequency: 100Hz

light:
  - platform: monochromatic
    name: Backlight
    id: backlight
    output: ledc_backlight
    restore_mode: ALWAYS_ON

display:
  - platform: mipi_rgb
    model: SEEED-INDICATOR-D1
    id: sensecap_display

touchscreen:
  platform: ft5x06
  id: sensecap_touchscreen
  transform:
    mirror_x: true
    mirror_y: true

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO38
      inverted: true
    name: Refresh Button
    id: refresh_button
    # 按下仅经 API binary_sensor 上报 bridge;由 bridge on_button 智能切换屏保(待机→睡 / 屏保→醒)。

# 触摸点选 session 用:每次点击递增,publish 值 = tap_seq*4 + 槽位索引。
# 自增保证值每次都变(同槽连点也会上报),bridge 取 int(value)%4 还原槽位。
globals:
  - id: tap_seq
    type: int
    restore_value: no
    initial_value: '0'
  # 屏保点屏唤醒:自增以强制上报,bridge 据此退出屏保
  - id: wake_seq
    type: int
    restore_value: no
    initial_value: '0'
  # 屏保是否处于激活态:门控矢量大眼睛的动画 interval;进/出屏保都由脚本翻转
  - id: saver_active
    type: bool
    restore_value: no
    initial_value: 'false'
  # 待机小眼睛是否可见(count==0 时显示):门控其矢量动画,由 set_sessions 翻转
  - id: standby_active
    type: bool
    restore_value: no
    initial_value: 'true'

sensor:
  - platform: template
    name: "Selected Session"
    id: selected_session
    accuracy_decimals: 0
    update_interval: never
  - platform: template
    name: "Screensaver Wake"
    id: screensaver_wake
    accuracy_decimals: 0
    update_interval: never

# 屏保进/出统一走脚本:翻转 saver_active、复位眼睛姿态、显隐 saver 层
script:
  - id: enter_saver
    then:
      - globals.set:
          id: saver_active
          value: 'true'
      - lambda: |-
          // 复位到"睁眼居中":眼睑收起、瞳孔归中
          lv_obj_set_height(id(top_lid), 0);
          lv_obj_set_y(id(bottom_lid), 250);
          lv_obj_set_height(id(bottom_lid), 0);
          lv_obj_align(id(pupil_l), LV_ALIGN_CENTER, 0, 0);
          lv_obj_align(id(pupil_r), LV_ALIGN_CENTER, 0, 0);
      - lvgl.widget.show: saver
      - light.turn_on: backlight
      - lvgl.resume:
      - lvgl.widget.redraw:
  - id: exit_saver
    then:
      - globals.set:
          id: saver_active
          value: 'false'
      - lvgl.widget.hide: saver
      - lvgl.resume:
      - lvgl.widget.redraw:

# 矢量眼睛动画驱动:40ms/tick(25fps)。视线用缓动平滑滑向目标(自然扫视,非瞬移)+
# 微抖动(别死盯);眨眼为快速三角波。同时驱动屏保大眼睛与待机小眼睛,各自按激活标志门控。
# gaze 单位为 native ±7(与原 raster look_x 一致):大眼睛 ×20/7 放大,小眼睛原样。
interval:
  - interval: 40ms
    then:
      - lambda: |-
          if (!id(saver_active) && !id(standby_active)) return;
          static float gaze = 0.0f;   // 当前视线(缓动量)
          static int t = 0;
          const int PERIOD = 150;     // 150*40ms = 6.0s 一轮
          t = (t + 1) % PERIOD;
          float target = 0.0f;
          if      (t < 35)  target = 0.0f;    // 居中
          else if (t < 62)  target = -7.0f;   // 看左
          else if (t < 82)  target = 0.0f;    // 回中
          else if (t < 109) target = 7.0f;    // 看右
          else              target = 0.0f;    // 回中(含眨眼)
          gaze += (target - gaze) * 0.20f;                 // 缓动滑移
          float g = gaze + 0.8f * sinf((float)t * 0.07f);  // 叠加微抖动
          float op = 1.0f;            // 睁开度:1=全睁
          if (t >= 128 && t < 140) {  // 眨眼窗口 ~480ms
            int b = t - 128;
            op = (b < 6) ? (1.0f - b / 5.0f) : ((b - 6) / 5.0f);
            if (op < 0.05f) op = 0.05f;
            if (op > 1.0f)  op = 1.0f;
          }
          if (id(saver_active)) {
            int h = (int)((1.0f - op) * 64.0f + 0.5f);
            int lx = (int)(g * 20.0f / 7.0f + (g >= 0 ? 0.5f : -0.5f));
            lv_obj_set_height(id(top_lid), h);
            lv_obj_set_y(id(bottom_lid), 250 - h);
            lv_obj_set_height(id(bottom_lid), h);
            lv_obj_align(id(pupil_l), LV_ALIGN_CENTER, lx, 0);
            lv_obj_align(id(pupil_r), LV_ALIGN_CENTER, lx, 0);
          }
          if (id(standby_active)) {
            int h2 = (int)((1.0f - op) * 22.0f + 0.5f);
            int lx2 = (int)(g + (g >= 0 ? 0.5f : -0.5f));
            lv_obj_set_height(id(top_lid_sm), h2);
            lv_obj_set_y(id(bottom_lid_sm), 80 - h2);
            lv_obj_set_height(id(bottom_lid_sm), h2);
            lv_obj_align(id(pupil_l_sm), LV_ALIGN_CENTER, lx2, 0);
            lv_obj_align(id(pupil_r_sm), LV_ALIGN_CENTER, lx2, 0);
          }

image: !include images.yaml

font:
  - file: "fonts/ChineseFont.ttf"
    id: font_lg
    size: 30
    bpp: 2
    glyphsets: []
    glyphs: !include glyphs_zh.yaml
  - file: "fonts/ChineseFont.ttf"
    id: font_sm
    size: 19
    bpp: 2
    glyphsets: []
    glyphs: !include glyphs_zh.yaml

lvgl:
  displays:
    - sensecap_display
  touchscreens: sensecap_touchscreen
  buffer_size: 50%
  default_font: font_sm
  log_level: WARN
  color_depth: 16
  bg_color: 0x05070D
  widgets:
    # 全屏背景:垂直渐变填充(上方辉光色 → 下方近黑),替代原 480x480 bg.png(省 ~450KB flash)
    - obj:
        align: CENTER
        width: 100%
        height: 100%
        radius: 0
        pad_all: 0
        border_width: 0
        clickable: false
        bg_color: 0x102A3A
        bg_grad_color: 0x05070D
        bg_grad_dir: VER
    # 待机头像:矢量小眼睛(与屏保大眼睛同款,缩到 ~0.34×)。count>0 时被 set_sessions 隐藏。
    # 容器置于 (0,0),子件坐标即屏幕坐标;眼中心左(68,58)/右(116,58),半径 22。
    - obj:
        id: standby_eyes
        align: TOP_LEFT
        x: 0
        y: 0
        width: 200
        height: 110
        bg_opa: 0
        radius: 0
        border_width: 0
        pad_all: 0
        clickable: false
        widgets:
          - obj:
              id: eye_l_sm
              align: TOP_LEFT
              x: 46
              y: 36
              width: 44
              height: 44
              radius: 22
              bg_color: 0x8FD8F5
              bg_grad_color: 0x1E6FB4
              bg_grad_dir: VER
              border_width: 0
              pad_all: 0
              clickable: false
              widgets:
                - obj:
                    align: CENTER
                    width: 32
                    height: 32
                    radius: 16
                    bg_color: 0x4FB0E6
                    border_width: 0
                    pad_all: 0
                    clickable: false
                - obj:
                    align: CENTER
                    width: 20
                    height: 20
                    radius: 10
                    bg_color: 0xBFEFFF
                    border_width: 0
                    pad_all: 0
                    clickable: false
                - obj:
                    id: pupil_l_sm
                    align: CENTER
                    width: 16
                    height: 16
                    radius: 8
                    bg_color: 0x0A1628
                    border_width: 0
                    pad_all: 0
                    clickable: false
                    widgets:
                      - obj:
                          align: CENTER
                          x: -6
                          y: -6
                          width: 8
                          height: 8
                          radius: 4
                          bg_color: 0xFFFFFF
                          bg_opa: 90%
                          border_width: 0
                          pad_all: 0
                          clickable: false
          - obj:
              id: eye_r_sm
              align: TOP_LEFT
              x: 94
              y: 36
              width: 44
              height: 44
              radius: 22
              bg_color: 0x8FD8F5
              bg_grad_color: 0x1E6FB4
              bg_grad_dir: VER
              border_width: 0
              pad_all: 0
              clickable: false
              widgets:
                - obj:
                    align: CENTER
                    width: 32
                    height: 32
                    radius: 16
                    bg_color: 0x4FB0E6
                    border_width: 0
                    pad_all: 0
                    clickable: false
                - obj:
                    align: CENTER
                    width: 20
                    height: 20
                    radius: 10
                    bg_color: 0xBFEFFF
                    border_width: 0
                    pad_all: 0
                    clickable: false
                - obj:
                    id: pupil_r_sm
                    align: CENTER
                    width: 16
                    height: 16
                    radius: 8
                    bg_color: 0x0A1628
                    border_width: 0
                    pad_all: 0
                    clickable: false
                    widgets:
                      - obj:
                          align: CENTER
                          x: -6
                          y: -6
                          width: 8
                          height: 8
                          radius: 4
                          bg_color: 0xFFFFFF
                          bg_opa: 90%
                          border_width: 0
                          pad_all: 0
                          clickable: false
          - obj:
              id: top_lid_sm
              align: TOP_LEFT
              x: 44
              y: 36
              width: 96
              height: 0
              bg_color: 0x102A3A
              bg_opa: 100%
              radius: 0
              border_width: 0
              pad_all: 0
              clickable: false
          - obj:
              id: bottom_lid_sm
              align: TOP_LEFT
              x: 44
              y: 80
              width: 96
              height: 0
              bg_color: 0x102A3A
              bg_opa: 100%
              radius: 0
              border_width: 0
              pad_all: 0
              clickable: false
    # 顶部 session 图标条:4 个可点槽位(Claude 星芒 + 项目名),默认隐藏,由 set_sessions 驱动。
    # 点击 -> 自增 tap_seq、publish selected_session(*4+索引),bridge 据此切换详情卡焦点。
    - button:
        id: slot0
        align: TOP_LEFT
        x: 4
        y: 10
        width: 112
        height: 92
        bg_opa: 0
        border_width: 0
        shadow_width: 0
        pad_all: 0
        hidden: true
        on_click:
          - lambda: 'id(tap_seq) += 1; id(selected_session).publish_state(id(tap_seq) * 4 + 0);'
        widgets:
          - animimg:
              id: slot0_icon
              align: TOP_MID
              y: 4
              src: [claude_00, claude_01, claude_02, claude_03, claude_04, claude_05, claude_06, claude_07, claude_08, claude_09, claude_10, claude_11]
              duration: 850ms
              repeat_count: forever
              auto_start: false
              image_recolor: 0xD97757
              image_recolor_opa: 100%
          - label:
              id: slot0_lbl
              align: BOTTOM_MID
